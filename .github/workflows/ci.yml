name: CI Pipeline
 
on:
  push:
    branches: [ "main" ]
 
jobs:
 
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: chmod +x gradlew
    - run: ./gradlew clean build
 
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - run: echo "Running tests..."
 
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - run: echo "Deploying..."
 
