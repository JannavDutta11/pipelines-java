name: CI Pipeline
 
on:
  push:
    branches: [ "main" ]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
 
    - name: Make Gradle executable
      run: chmod +x gradlew
 
    - name: Build with Gradle
      run: ./gradlew clean build
