trigger:
- main
 
stages:
 
#  Stage 1: Build
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    pool:
      vmImage: ubuntu-latest
 
    steps:
    - script: chmod +x gradlew
      displayName: Make Gradle executable
 
    - task: Gradle@3
      inputs:
        gradleWrapperFile: 'gradlew'
        tasks: 'clean build'
        publishJUnitResults: true
        testResultsFiles: '**/TEST-*.xml'
 
#  Stage 2: Test
- stage: Test
  displayName: Test Stage
  dependsOn: Build
  jobs:
  - job: TestJob
    pool:
      vmImage: ubuntu-latest
 
    steps:
    - script: echo "Running additional tests..."
      displayName: Dummy Test Step
 
#  Stage 3: Deploy
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Test
  jobs:
  - job: DeployJob
    pool:
      vmImage: ubuntu-latest
 
    steps:
    - script: echo "Deploying application..."
      displayName: Dummy Deploy Step
 
